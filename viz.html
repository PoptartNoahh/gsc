<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GSC - How It Works</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06060c;--panel:rgba(12,12,22,.85);--border:#1a1a2a;
  --text:#b8b8cc;--dim:#4a4a62;--white:#eef;--blue:#5b8cff;
  --cyan:#4de8e0;--green:#4de89a;--yellow:#ffd55a;--red:#ff5a6e;
  --mono:'SF Mono',Menlo,Consolas,monospace}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif}
canvas{display:block}

.panel{position:fixed;background:var(--panel);border:1px solid var(--border);
  border-radius:10px;backdrop-filter:blur(16px);padding:16px 20px;z-index:10}

.top{top:16px;left:50%;transform:translateX(-50%);text-align:center;padding:12px 28px;border-radius:24px}
.top h1{font-size:1rem;font-weight:700;color:var(--white);letter-spacing:-.02em}
.top p{font-size:.72rem;color:var(--dim);margin-top:4px}

.ctrl{top:16px;left:16px;width:220px}
.ctrl .label{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.ctrl .row{display:flex;align-items:center;gap:8px;margin:8px 0}
.ctrl input[type=range]{flex:1;accent-color:var(--blue)}
.ctrl .val{font-family:var(--mono);font-size:.8rem;color:var(--white);min-width:20px;text-align:right}
.ctrl button{padding:6px 12px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--text);font-size:.75rem;cursor:pointer;font-family:inherit;transition:.15s}
.ctrl button:hover{border-color:var(--blue);color:var(--blue)}
.ctrl button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.ctrl .sep{height:1px;background:var(--border);margin:12px 0}

.stats{bottom:16px;left:16px;width:220px;font-family:var(--mono);font-size:.75rem}
.stats .title{font-family:inherit;font-weight:700;color:var(--white);margin-bottom:8px;font-size:.8rem}
.stats .row{display:flex;justify-content:space-between;margin:3px 0;color:var(--dim)}
.stats .row b{color:var(--text);font-weight:600}

.path{bottom:16px;right:16px;width:280px;font-family:var(--mono);font-size:.75rem;display:none}
.path .title{font-weight:700;color:var(--white);margin-bottom:8px;font-size:.8rem}
.path .step{display:flex;align-items:center;gap:8px;margin:4px 0;padding:4px 8px;border-radius:4px}
.path .step.active{background:rgba(91,140,255,.15)}
.path .depth{color:var(--dim);min-width:50px}
.path .cell{color:var(--cyan)}
.path .arrow{color:var(--dim)}
.path .bits{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);color:var(--dim)}
.path .bits b{color:var(--green)}
.path .err{color:var(--yellow)}

.hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  font-size:.72rem;color:var(--dim);z-index:10;pointer-events:none;transition:opacity .3s}
</style>
</head>
<body>

<div class="panel top">
  <h1>geodesic subdivision compression</h1>
  <p>click a point to trace its encoding path</p>
</div>

<div class="panel ctrl">
  <div class="label">subdivision depth</div>
  <div class="row">
    <input type="range" id="depth" min="0" max="5" step="1" value="0">
    <span class="val" id="depth-val">0</span>
  </div>

  <div class="sep"></div>
  <div class="label">display</div>
  <div class="row" style="flex-wrap:wrap;gap:4px">
    <button id="btn-wire" class="active">wireframe</button>
    <button id="btn-faces">faces</button>
    <button id="btn-points">points</button>
  </div>

  <div class="sep"></div>
  <div class="label">points</div>
  <div class="row">
    <input type="range" id="npts" min="10" max="500" step="10" value="100">
    <span class="val" id="npts-val">100</span>
  </div>
  <div class="row">
    <button id="btn-scatter">scatter</button>
    <button id="btn-clear">clear</button>
  </div>
</div>

<div class="panel stats" id="stats">
  <div class="title">stats</div>
  <div class="row"><span>faces</span><b id="s-faces">20</b></div>
  <div class="row"><span>cells</span><b id="s-cells">20</b></div>
  <div class="row"><span>precision</span><b id="s-prec">23.6 deg</b></div>
  <div class="row"><span>tree bits/pt</span><b id="s-bits">~5</b></div>
</div>

<div class="panel path" id="path-panel">
  <div class="title">encoding path</div>
  <div id="path-steps"></div>
</div>

<div class="hint" id="hint">scroll to zoom, drag to rotate</div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x06060c);
renderer.setSize(innerWidth, innerHeight);
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 1.2, 2.8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 1.5;
controls.maxDistance = 8;

/* ---- icosahedron ---- */

function normalize(v) {
  const n = Math.sqrt(v[0]*v[0] + v[1]*v[1] + v[2]*v[2]);
  return n > 1e-15 ? [v[0]/n, v[1]/n, v[2]/n] : v;
}
function cross(a, b) {
  return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
}
function dot(a, b) { return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }
function add(a, b) { return [a[0]+b[0], a[1]+b[1], a[2]+b[2]]; }
function sub(a, b) { return [a[0]-b[0], a[1]-b[1], a[2]-b[2]]; }
function scale(a, s) { return [a[0]*s, a[1]*s, a[2]*s]; }
function mid(a, b) { return normalize(scale(add(a, b), 0.5)); }

function makeIcosahedron() {
  const verts = new Array(12);
  verts[0] = [0, 0, 1];
  verts[11] = [0, 0, -1];
  const zr = 1 / Math.sqrt(5), rr = 2 / Math.sqrt(5);
  for (let k = 0; k < 5; k++) {
    const a = k * 2 * Math.PI / 5;
    verts[1+k] = [rr*Math.cos(a), rr*Math.sin(a), zr];
  }
  for (let k = 0; k < 5; k++) {
    const a = (k+0.5) * 2 * Math.PI / 5;
    verts[6+k] = [rr*Math.cos(a), rr*Math.sin(a), -zr];
  }

  const faces = [];
  for (let k=0;k<5;k++) faces.push([0,1+k,1+(k+1)%5]);
  for (let k=0;k<5;k++) faces.push([1+k,6+k,1+(k+1)%5]);
  for (let k=0;k<5;k++) faces.push([6+k,1+(k+1)%5,6+(k+1)%5]);
  for (let k=0;k<5;k++) faces.push([11,6+(k+1)%5,6+k]);

  for (let i = 0; i < 20; i++) {
    const [i0,i1,i2] = faces[i];
    const cent = add(add(verts[i0], verts[i1]), verts[i2]);
    const nrm = cross(sub(verts[i1],verts[i0]), sub(verts[i2],verts[i0]));
    if (dot(nrm, cent) < 0) faces[i] = [i0, i2, i1];
  }
  return { verts, faces };
}

function subdivide(v0, v1, v2) {
  const m01 = mid(v0,v1), m12 = mid(v1,v2), m20 = mid(v2,v0);
  return [
    [v0, m01, m20],
    [m01, v1, m12],
    [m20, m12, v2],
    [m01, m12, m20]
  ];
}

function getTriangles(verts, faces, depth) {
  let tris = faces.map(([i0,i1,i2]) => [verts[i0], verts[i1], verts[i2]]);
  for (let d = 0; d < depth; d++) {
    const next = [];
    for (const [v0,v1,v2] of tris) next.push(...subdivide(v0,v1,v2));
    tris = next;
  }
  return tris;
}

function pointInTri(dir, v0, v1, v2) {
  return dot(dir, cross(v0,v1)) >= 0 &&
         dot(dir, cross(v1,v2)) >= 0 &&
         dot(dir, cross(v2,v0)) >= 0;
}

function classifyPoint(dir, verts, faces, maxDepth) {
  const path = [];

  let faceIdx = -1;
  for (let fi = 0; fi < 20; fi++) {
    const [i0,i1,i2] = faces[fi];
    if (pointInTri(dir, verts[i0], verts[i1], verts[i2])) { faceIdx = fi; break; }
  }
  if (faceIdx === -1) {
    let best = -2;
    for (let fi = 0; fi < 20; fi++) {
      const [i0,i1,i2] = faces[fi];
      const c = normalize(add(add(verts[i0],verts[i1]),verts[i2]));
      const d = dot(dir, c);
      if (d > best) { best = d; faceIdx = fi; }
    }
  }

  const [i0,i1,i2] = faces[faceIdx];
  let v0 = verts[i0], v1 = verts[i1], v2 = verts[i2];
  path.push({ depth: 0, face: faceIdx, child: -1, tri: [v0,v1,v2] });

  for (let d = 0; d < maxDepth; d++) {
    const subs = subdivide(v0, v1, v2);
    let childIdx = -1;
    for (let c = 0; c < 4; c++) {
      if (pointInTri(dir, subs[c][0], subs[c][1], subs[c][2])) { childIdx = c; break; }
    }
    if (childIdx === -1) {
      let best = -2;
      for (let c = 0; c < 4; c++) {
        const ct = normalize(add(add(subs[c][0],subs[c][1]),subs[c][2]));
        const d2 = dot(dir, ct);
        if (d2 > best) { best = d2; childIdx = c; }
      }
    }
    v0 = subs[childIdx][0]; v1 = subs[childIdx][1]; v2 = subs[childIdx][2];
    path.push({ depth: d+1, face: faceIdx, child: childIdx, tri: [v0,v1,v2] });
  }

  const centroid = normalize(add(add(v0,v1),v2));
  return { path, centroid, faceIdx };
}

/* ---- scene objects ---- */

const ico = makeIcosahedron();

const depthColors = [
  0x5b8cff, 0x4de8e0, 0x4de89a, 0xffd55a, 0xff8844, 0xff5a6e
];

let wireGroup = new THREE.Group();
let faceGroup = new THREE.Group();
let pointGroup = new THREE.Group();
let pathGroup = new THREE.Group();
let centroidMesh = null;
scene.add(wireGroup, faceGroup, pointGroup, pathGroup);

const sphereGhost = new THREE.Mesh(
  new THREE.SphereGeometry(0.995, 64, 48),
  new THREE.MeshBasicMaterial({ color: 0x0a0a18, transparent: true, opacity: 0.4 })
);
scene.add(sphereGhost);

let currentDepth = 0;
let showWire = true, showFaces = false, showPoints = false;
let points = [];
let selectedPoint = null;

function buildWireframe(depth) {
  wireGroup.clear();
  if (!showWire) return;

  const tris = getTriangles(ico.verts, ico.faces, depth);
  const positions = [];
  for (const [v0,v1,v2] of tris) {
    positions.push(...v0, ...v1, ...v1, ...v2, ...v2, ...v0);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  const mat = new THREE.LineBasicMaterial({
    color: depthColors[Math.min(depth, 5)],
    transparent: true,
    opacity: depth > 3 ? 0.3 : 0.5,
  });
  wireGroup.add(new THREE.LineSegments(geo, mat));
}

function buildFaces(depth) {
  faceGroup.clear();
  if (!showFaces) return;

  const tris = getTriangles(ico.verts, ico.faces, depth);
  const positions = [];
  const colors = [];

  for (let i = 0; i < tris.length; i++) {
    const [v0,v1,v2] = tris[i];
    positions.push(...v0, ...v1, ...v2);
    const faceBase = i % 20;
    const hue = faceBase / 20;
    const c = new THREE.Color().setHSL(hue, 0.5, 0.25);
    for (let j = 0; j < 3; j++) colors.push(c.r, c.g, c.b);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  geo.computeVertexNormals();
  const mat = new THREE.MeshBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0.6, side: THREE.DoubleSide
  });
  faceGroup.add(new THREE.Mesh(geo, mat));
}

function buildPoints() {
  pointGroup.clear();
  if (!showPoints || points.length === 0) return;

  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(points.length * 3);
  const col = new Float32Array(points.length * 3);
  for (let i = 0; i < points.length; i++) {
    const p = points[i];
    pos[i*3] = p[0]; pos[i*3+1] = p[1]; pos[i*3+2] = p[2];
    const hue = p._faceIdx / 20;
    const c = new THREE.Color().setHSL(hue, 0.8, 0.65);
    col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(col, 3));

  const mat = new THREE.PointsMaterial({ size: 6, vertexColors: true, sRGBEncoding: false });
  pointGroup.add(new THREE.Points(geo, mat));
}

function scatterPoints() {
  const n = parseInt(document.getElementById('npts').value);
  points = [];
  for (let i = 0; i < n; i++) {
    const theta = Math.random() * 2 * Math.PI;
    const phi = Math.acos(2 * Math.random() - 1);
    const dir = [Math.sin(phi)*Math.cos(theta), Math.sin(phi)*Math.sin(theta), Math.cos(phi)];
    let faceIdx = 0;
    for (let fi = 0; fi < 20; fi++) {
      const [i0,i1,i2] = ico.faces[fi];
      if (pointInTri(dir, ico.verts[i0], ico.verts[i1], ico.verts[i2])) { faceIdx = fi; break; }
    }
    dir._faceIdx = faceIdx;
    points.push(dir);
  }
  showPoints = true;
  document.getElementById('btn-points').classList.add('active');
  buildPoints();
  selectPoint(null);
}

function highlightPath(result) {
  pathGroup.clear();

  if (centroidMesh) { scene.remove(centroidMesh); centroidMesh = null; }

  const { path, centroid } = result;
  const maxD = path.length - 1;

  for (let i = 0; i < path.length; i++) {
    const { tri } = path[i];
    const positions = [...tri[0], ...tri[1], ...tri[1], ...tri[2], ...tri[2], ...tri[0]];
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

    const isLeaf = i === path.length - 1;
    const color = isLeaf ? 0x4de89a : 0xffffff;
    const opacity = isLeaf ? 1.0 : 0.3 + 0.4 * (i / maxD);
    const mat = new THREE.LineBasicMaterial({
      color, transparent: true, opacity, linewidth: 2
    });
    pathGroup.add(new THREE.LineSegments(geo, mat));

    if (isLeaf) {
      const fpos = [];
      fpos.push(...tri[0], ...tri[1], ...tri[2]);
      const fgeo = new THREE.BufferGeometry();
      fgeo.setAttribute('position', new THREE.Float32BufferAttribute(fpos, 3));
      const fmat = new THREE.MeshBasicMaterial({
        color: 0x4de89a, transparent: true, opacity: 0.25, side: THREE.DoubleSide
      });
      pathGroup.add(new THREE.Mesh(fgeo, fmat));
    }
  }

  const cGeo = new THREE.SphereGeometry(0.025, 12, 8);
  const cMat = new THREE.MeshBasicMaterial({ color: 0xff5a6e });
  centroidMesh = new THREE.Mesh(cGeo, cMat);
  centroidMesh.position.set(centroid[0], centroid[1], centroid[2]);
  scene.add(centroidMesh);

  const panel = document.getElementById('path-panel');
  const stepsEl = document.getElementById('path-steps');
  let html = '';
  for (let i = 0; i < path.length; i++) {
    const s = path[i];
    const label = i === 0 ? `face ${s.face}` : `child ${s.child}`;
    const cls = i === path.length - 1 ? 'step active' : 'step';
    html += `<div class="${cls}">
      <span class="depth">d=${s.depth}</span>
      <span class="arrow">${i > 0 ? '\u2192' : '\u25C9'}</span>
      <span class="cell">${label}</span>
    </div>`;
  }

  const angPrec = (180 / Math.PI) * 2 * Math.asin(1 / Math.sqrt(20 * Math.pow(4, maxD)));
  const topoBits = 1 + maxD * 5;
  html += `<div class="bits">topology: <b>${topoBits} bits</b> for this path</div>`;
  html += `<div class="bits">precision: <b>~${angPrec.toFixed(2)} deg</b></div>`;
  html += `<div class="bits err">centroid = <b style="color:var(--red)">red dot</b></div>`;

  stepsEl.innerHTML = html;
  panel.style.display = '';
}

function selectPoint(dir) {
  selectedPoint = dir;
  pathGroup.clear();
  if (centroidMesh) { scene.remove(centroidMesh); centroidMesh = null; }

  if (!dir) {
    document.getElementById('path-panel').style.display = 'none';
    return;
  }

  const result = classifyPoint(dir, ico.verts, ico.faces, currentDepth);
  highlightPath(result);
}

/* ---- raycasting for point selection ---- */

const raycaster = new THREE.Raycaster();
raycaster.params.Points.threshold = 0.05;
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e) => {
  if (!showPoints || points.length === 0) return;

  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const cloud = pointGroup.children[0];
  if (!cloud) return;
  const hits = raycaster.intersectObject(cloud);
  if (hits.length > 0) {
    const idx = hits[0].index;
    selectPoint(points[idx]);
  }
});

/* ---- stats ---- */

function updateStats() {
  const cells = 20 * Math.pow(4, currentDepth);
  const angPrec = (180 / Math.PI) * 2 * Math.asin(1 / Math.sqrt(cells));
  const estBits = currentDepth === 0 ? '~5' : `~${Math.max(3, 1 + currentDepth * 2.5).toFixed(0)}`;
  document.getElementById('s-faces').textContent = '20';
  document.getElementById('s-cells').textContent = cells.toLocaleString();
  document.getElementById('s-prec').textContent = angPrec.toFixed(2) + ' deg';
  document.getElementById('s-bits').textContent = estBits;
}

/* ---- controls ---- */

document.getElementById('depth').addEventListener('input', e => {
  currentDepth = parseInt(e.target.value);
  document.getElementById('depth-val').textContent = currentDepth;
  buildWireframe(currentDepth);
  buildFaces(currentDepth);
  if (selectedPoint) selectPoint(selectedPoint);
  updateStats();
});

function toggleBtn(id, getter, setter) {
  document.getElementById(id).addEventListener('click', () => {
    setter(!getter());
    document.getElementById(id).classList.toggle('active', getter());
  });
}

toggleBtn('btn-wire', () => showWire, v => { showWire = v; buildWireframe(currentDepth); });
toggleBtn('btn-faces', () => showFaces, v => { showFaces = v; buildFaces(currentDepth); });
toggleBtn('btn-points', () => showPoints, v => { showPoints = v; buildPoints(); });

document.getElementById('btn-scatter').addEventListener('click', scatterPoints);
document.getElementById('btn-clear').addEventListener('click', () => {
  points = []; buildPoints(); selectPoint(null);
});

document.getElementById('npts').addEventListener('input', e => {
  document.getElementById('npts-val').textContent = e.target.value;
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ---- animate ---- */

buildWireframe(0);
updateStats();

setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 4000);

(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
